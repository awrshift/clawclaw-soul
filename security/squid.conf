# Soul Oracle — Squid Proxy Configuration
# Purpose: Domain allowlist for AI agent egress control
# Only allowed domains can be reached from internal network

# ACL definitions
acl localnet src 172.16.0.0/12    # Docker internal networks
acl SSL_ports port 443
acl Safe_ports port 80
acl Safe_ports port 443

# Domain allowlist — ONLY these domains are reachable
acl allowed_domains dstdomain .anthropic.com
acl allowed_domains dstdomain .api.anthropic.com
acl allowed_domains dstdomain api.telegram.org
acl allowed_domains dstdomain .sentry.io

# Access rules
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow CONNECT (HTTPS) only to allowed domains
http_access allow CONNECT allowed_domains
http_access allow allowed_domains

# Deny everything else
http_access deny all

# Proxy settings
http_port 3128
coredump_dir /var/spool/squid

# Logging (minimal — security events only)
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log

# Disable caching (not needed for API calls)
cache deny all

# Security headers
via off
forwarded_for delete
request_header_access X-Forwarded-For deny all

# Connection limits
client_lifetime 5 minutes
connect_timeout 30 seconds
read_timeout 60 seconds
