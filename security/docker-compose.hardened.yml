# Soul Oracle — Hardened Docker Compose
# Security: Infrastructure-Containment-First (Experiments 011 + 012)
#
# Architecture:
#   soul-api (FastAPI) ──internal──> squid-proxy ──external──> internet
#   openclaw (Node.js)  ──internal──> squid-proxy ──external──> internet
#
# Key principles:
#   - read-only filesystem (no persistence for attackers)
#   - cap-drop ALL (no Linux capabilities)
#   - internal network (zero direct egress)
#   - Squid proxy (domain allowlist only)
#   - cgroups resource limits (prevent DoS)
#   - no-new-privileges (block privilege escalation)
#   - non-root users in all containers
#   - Docker Compose secrets for credentials
#   - undici proxy agent for Node.js fetch() (native fetch ignores HTTP_PROXY)
#
# Updated: Exp 012 corrections (Node 22 not 24, undici proxy, secrets, health checks)

services:
  soul-api:
    build:
      context: ..
      dockerfile: security/Dockerfile.soul-api
    image: soul-oracle/soul-api:latest
    container_name: soul-api
    read_only: true
    security_opt:
      - no-new-privileges:true
      - seccomp=security/seccomp-profile.json
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    environment:
      - HTTP_PROXY=http://squid-proxy:3128
      - HTTPS_PROXY=http://squid-proxy:3128
      - SOUL_DATA_DIR=/app/data
    volumes:
      - soul-data:/app/data
    networks:
      - internal
    depends_on:
      squid-proxy:
        condition: service_healthy
    restart: unless-stopped
    user: "1001:1001"

  openclaw:
    build:
      context: ..
      dockerfile: security/Dockerfile.openclaw
    image: soul-oracle/openclaw:latest
    container_name: soul-openclaw
    read_only: true
    security_opt:
      - no-new-privileges:true
      - seccomp=security/seccomp-profile.json
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          memory: 1G
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    environment:
      - HTTP_PROXY=http://squid-proxy:3128
      - HTTPS_PROXY=http://squid-proxy:3128
    secrets:
      - anthropic_api_key
      - telegram_bot_token
    volumes:
      - openclaw-data:/home/oclawuser/.openclaw
      - ./openclaw-security.json:/home/oclawuser/.openclaw/openclaw.json:ro
    networks:
      - internal
    depends_on:
      soul-api:
        condition: service_healthy
      squid-proxy:
        condition: service_healthy
    restart: unless-stopped
    user: "1001:1001"

  squid-proxy:
    image: ubuntu/squid:latest
    container_name: soul-squid
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE  # Required for proxy on port 3128
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    tmpfs:
      - /var/spool/squid:size=128m
      - /var/log/squid:size=32m
    volumes:
      - ./squid.conf:/etc/squid/squid.conf:ro
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3128 || exit 1"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped

secrets:
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  telegram_bot_token:
    file: ./secrets/telegram_bot_token.txt

volumes:
  soul-data:
    driver: local
  openclaw-data:
    driver: local

networks:
  internal:
    internal: true  # No gateway — containers cannot reach internet directly
  external:
    driver: bridge  # Only squid-proxy has access
